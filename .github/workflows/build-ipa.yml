name: Build Off-Day IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build (Fix Space & No Sign)
        run: |
          # 找到项目文件，自动适配带空格的名称
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$PROJECT" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          # 无签名编译打包
          xcodebuild clean archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "Off-Day.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Export IPA (TrollStore专用)
        run: |
          # 自动找到.app包
          APP_PATH=$(find "Off-Day.xcarchive/Products/Applications" -name "*.app" | head -n 1)
          # 制作Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          # 打包成IPA
          zip -r Off-Day.ipa Payload/
          # 清理
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Off-Day-IPA
          path: Off-Day.ipa
