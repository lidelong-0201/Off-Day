name: Build TrollStore IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: |
          xcode-select --print-path
          xcodebuild -version

      - name: List schemes in project
        run: |
          echo "=== xcodebuild -list ==="
          xcodebuild -project "Off Day.xcodeproj" -list || true

      - name: Build (no code signing)
        run: |
          set -x
          # 尝试用多种不签名选项以兼容不同 Xcode 版本
          xcodebuild -project "Off Day.xcodeproj" \
            -scheme "Off Day" \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log || true

      - name: Debug - show build logs and outputs
        if: always()
        run: |
          echo "=== Tail build.log ==="
          tail -200 build.log || true
          echo "=== Find .app under build/Build/Products ==="
          find build/Build/Products -type d -name "*.app" -maxdepth 6 || true
          echo "=== Find .app under build (other) ==="
          find build -type d -name "*.app" -maxdepth 6 || true
          echo "=== List build tree ==="
          ls -la build || true
          echo "=== search DerivedData (global) ==="
          find ~/Library/Developer/Xcode/DerivedData -type d -name "*.app" -maxdepth 6 2>/dev/null || true

      - name: Locate .app and create IPA
        run: |
          set -e
          # 尝试多处寻找 .app（优先 build/Build/Products/...）
          APP_PATH=$(find build/Build/Products -type d -name "*.app" 2>/dev/null | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -type d -name "*.app" 2>/dev/null | head -n 1 || true)
          fi
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "*.app" 2>/dev/null | head -n 1 || true)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found. See debug output above (build.log and find results)."
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"
          APP_NAME=$(basename "$APP_PATH")
          echo "App basename: $APP_NAME"

          # 复制并打包为 IPA
          mkdir -p output/Payload
          cp -R "$APP_PATH" "output/Payload/$APP_NAME"
          pushd output
          zip -r -q "../${APP_NAME}.ipa" Payload
          popd
          ls -lh "${APP_NAME}.ipa" || true
          # 把 ipa 移回仓库根
          mv "${APP_NAME}.ipa" . || true

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Off-Day-TrollStore-IPA
          path: "*.ipa"
          retention-days: 30
