name: Build Off-Day IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Show project structure
        run: |
          echo "=== Project Structure ==="
          find . -type f -name "*.xcodeproj" -o -name "*.xcworkspace"
          echo "=== Xcode Project Info ==="
          ls -la
          xcodebuild -list || echo "xcodebuild list failed"

      - name: Build IPA (TrollStore Compatible - No Sign)
        run: |
          # 自动查找项目文件
          PROJECT_FILE=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ Error: No .xcodeproj file found!"
            exit 1
          fi
          
          # 自动获取 Scheme
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_FILE" | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          if [ -z "$SCHEME_NAME" ]; then
            echo "❌ Error: No scheme found!"
            exit 1
          fi
          
          echo "📁 Found project: $PROJECT_FILE"
          echo "📋 Found scheme: $SCHEME_NAME"
          
          # 无签名编译（关键！巨魔专用）
          xcodebuild clean archive \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME_NAME" \
            -destination "generic/platform=iOS" \
            -archivePath "Off-Day.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
          
          # 检查归档是否生成
          if [ ! -d "Off-Day.xcarchive" ]; then
            echo "❌ Error: Archive not created!"
            exit 1
          fi
          
          # 提取 .app 文件
          APP_PATH=$(find Off-Day.xcarchive/Products/Applications -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: No .app file found in archive!"
            exit 1
          fi
          
          echo "📦 Found app: $APP_PATH"
          
          # 制作 IPA 包（标准格式）
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Off-Day.ipa Payload/
          
          # 清理
          rm -rf Payload
          
          # 检查 IPA 是否生成
          if [ ! -f "Off-Day.ipa" ]; then
            echo "❌ Error: IPA file not created!"
            exit 1
          fi
          
          echo "✅ IPA created successfully!"
          ls -la Off-Day.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Off-Day-IPA
          path: Off-Day.ipa
          retention-days: 7
