name: Build Off-Day IPA (TrollStore专用)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 检查项目信息（排查用）
        run: |
          echo "=== 项目文件列表 ==="
          ls -la
          echo "=== 找到的Xcode项目 ==="
          find . -name "*.xcodeproj"
          echo "=== 项目可用Scheme列表 ==="
          xcodebuild -list -project "Off Day.xcodeproj"

      - name: 无签名编译打包（巨魔专用）
        run: |
          # 固定原仓库的项目名和Scheme，彻底避免空格/名称错误
          PROJECT="Off Day.xcodeproj"
          SCHEME="Off Day"

          # 全参数关闭签名，强制覆盖所有可能的签名校验
          xcodebuild clean archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "Off-Day.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.offday.trollbuild \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          # 校验编译是否成功
          APP_PATH="Off-Day.xcarchive/Products/Applications/Off Day.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 编译失败，请检查上面的详细错误日志"
            exit 1
          fi

          # 制作标准IPA（巨魔直接安装）
          rm -rf Payload Off-Day.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r Off-Day.ipa Payload/
          rm -rf Payload

          echo "✅ IPA打包成功！文件大小：$(ls -lh Off-Day.ipa | awk '{print $5}')"

      - name: 上传IPA成品
        uses: actions/upload-artifact@v4
        with:
          name: Off-Day-IPA
          path: Off-Day.ipa
          retention-days: 7
