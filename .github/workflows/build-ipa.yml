name: Build Off-Day IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Reverted to stable v4

      - name: Show project structure
        run: |
          echo "=== Project Structure ==="
          ls -la
          find . -maxdepth 2 -type d \( -name "*.xcodeproj" -o -name "*.xcworkspace" \)

      - name: Build IPA (TrollStore Compatible - No Sign)
        run: |
          # 1. Automatically detect Workspace or Project
          if [ -d "Off-Day.xcworkspace" ] || find . -maxdepth 2 -name "*.xcworkspace" | grep -q .; then
            BUILD_TARGET=$(find . -maxdepth 2 -name "*.xcworkspace" | head -n 1)
            TARGET_FLAG="-workspace"
            echo "📁 Found workspace: $BUILD_TARGET"
          else
            BUILD_TARGET=$(find . -maxdepth 2 -name "*.xcodeproj" | head -n 1)
            TARGET_FLAG="-project"
            if [ -z "$BUILD_TARGET" ]; then
              echo "❌ Error: No .xcodeproj or .xcworkspace file found!"
              exit 1
            fi
            echo "📁 Found project: $BUILD_TARGET"
          fi
          
          # 2. Extract the Scheme automatically
          # Uses awk to grab the first scheme listed under the "Schemes:" section
          SCHEME_NAME=$(xcodebuild -list $TARGET_FLAG "$BUILD_TARGET" | awk '/Schemes:/{flag=1; next} /^[[:space:]]*$/{flag=0} flag {print $1; exit}')
          
          if [ -z "$SCHEME_NAME" ]; then
            echo "❌ Error: No scheme found! Attempting fallback to 'Off-Day'"
            SCHEME_NAME="Off-Day" # Add your exact scheme name here as a fallback
          fi
          echo "📋 Using scheme: $SCHEME_NAME"
          
          # 3. Unsigned Build for TrollStore
          xcodebuild clean archive \
            $TARGET_FLAG "$BUILD_TARGET" \
            -scheme "$SCHEME_NAME" \
            -destination "generic/platform=iOS" \
            -archivePath "Off-Day.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
          
          if [ ! -d "Off-Day.xcarchive" ]; then
            echo "❌ Error: Archive not created!"
            exit 1
          fi
          
          # 4. Extract .app and package to .ipa
          APP_PATH=$(find Off-Day.xcarchive/Products/Applications -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: No .app file found in archive!"
            exit 1
          fi
          
          echo "📦 Found app: $APP_PATH"
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr Off-Day.ipa Payload/ # added -q for quiet zipping to avoid cluttering logs
          rm -rf Payload
          
          if [ ! -f "Off-Day.ipa" ]; then
            echo "❌ Error: IPA file not created!"
            exit 1
          fi
          
          echo "✅ IPA created successfully!"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Off-Day-TrollStore-IPA
          path: Off-Day.ipa
          retention-days: 7
